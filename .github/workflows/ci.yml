name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Validation Engines
        run: |
          npm install -g htmlhint html-validator-cli

      - name: Execute HTML Architecture Linting
        run: |
          htmlhint "*.html"

      - name: Verify Document Structural Integrity
        run: |
          html-validator --file=index.html
          html-validator --file=telemetry.html
          html-validator --file=perspectives.html
          html-validator --file=network.html
          
